name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      - name: Build (via Makefile — catches cp / path drift)
        run: make build
      - name: Test (via Makefile — regenerates Version.swift first)
        run: make test
      - name: Smoke — version
        run: build/reverse-scroll-cli --version
